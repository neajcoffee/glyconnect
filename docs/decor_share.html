<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glyconnect Studio</title>
<style>
  :root{--bg:#0e1116;--panel:#161b22;--border:#30363d;--text:#c9d1d9;--accent:#58a6ff;--green:#2ea043}
  *{box-sizing:border-box}
  body{margin:0 auto;padding:14px;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);max-width:560px}
  .studio-header h1{font-size:20px;margin:0 0 6px;color:var(--accent)}
  .studio-header .intro{font-size:13px;opacity:0.75;margin:0 0 18px;line-height:1.5}

  /* === MODE STUDIO (desktop ≥ 900px) ====================================== */
  @media (min-width:900px){
    body{max-width:1400px;height:100vh;padding:14px 20px;box-sizing:border-box;display:grid;grid-template-columns:1fr 360px;grid-template-rows:auto 1fr auto;grid-template-areas:"header header" "main side" "main code";gap:12px 18px;overflow:hidden}
    body > .studio-header{grid-area:header;margin:0}
    body > .studio-header .intro{margin:0;font-size:12px}
    body > .studio-side{grid-area:side;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-right:4px}
    body > .studio-side .step{margin-top:0}
    body > .canvas-step{grid-area:main;min-height:0;display:flex;flex-direction:column;margin:0;overflow:hidden}
    body > .canvas-step .canvas-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden}
    body > .canvas-step #canvas{aspect-ratio:32/8;flex-shrink:0}
    body > #stepCode{grid-area:code;margin-top:0}
    body.focus-mode{display:block;height:auto;padding:0}
  }
  h1{font-size:20px;margin:0 0 6px;color:var(--accent)}
  .intro{font-size:13px;opacity:0.75;margin:0 0 18px;line-height:1.5}
  label{display:block;font-size:13px;margin:14px 0 4px;opacity:0.85}
  input[type=text]{width:100%;padding:10px;font-size:14px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;font-family:inherit;box-sizing:border-box}
  input[type=text]:focus{outline:none;border-color:var(--accent)}

  .canvas-wrap{margin:10px 0;padding:0;width:100%}
  #canvas{display:grid;grid-template-columns:repeat(32,1fr);grid-template-rows:repeat(8,1fr);gap:1px;background:var(--border);padding:2px;border-radius:4px;width:100%;aspect-ratio:32/8;user-select:none;touch-action:none}
  #canvas div{background:#0e1116;cursor:crosshair;border-radius:1px;min-width:0;min-height:0}
  #canvas div:hover{outline:1px solid var(--accent)}

  /* Hue palette panel */
  .pal-panel{background:#0a0d12;border:1px solid var(--border);border-radius:6px;padding:6px;margin:8px 0}
  .pal-row{display:flex;gap:2px;margin-bottom:2px}
  .pal-row:last-child{margin-bottom:0}
  .pal-row .lbl{width:38px;font-size:9px;opacity:0.55;display:flex;align-items:center;flex-shrink:0}
  .pal-row .swatches{display:flex;gap:2px;flex:1;flex-wrap:wrap}
  .sw{width:18px;height:18px;border:1.5px solid #30363d;border-radius:3px;cursor:pointer;flex-shrink:0}
  .sw.active{border-color:var(--accent);border-width:2px;transform:scale(1.15)}
  .sw:hover{border-color:#888}

  .ctrls{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0;align-items:center}
  button{padding:7px 11px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.copy{background:var(--accent);color:var(--bg);border:none;font-weight:600;padding:9px 14px;font-size:13px}

  .shift-grid{display:grid;grid-template-columns:repeat(3,32px);grid-template-rows:repeat(3,28px);gap:3px;margin:6px 0}
  .shift-grid button{padding:0;font-size:14px;width:32px;height:28px}
  .shift-grid .empty{visibility:hidden}

  textarea{width:100%;height:130px;padding:10px 42px 10px 10px;font-family:ui-monospace,Menlo,monospace;font-size:11px;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:6px;resize:vertical;box-sizing:border-box;margin-top:8px;display:block}
  .code-wrap{position:relative}
  .copy-btn{position:absolute;top:14px;right:8px;width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;background:rgba(88,166,255,0.12);color:var(--accent);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all 0.15s}
  .copy-btn:hover{background:rgba(88,166,255,0.22);border-color:var(--accent)}
  .copy-btn.ok{background:var(--green);color:white;border-color:var(--green)}
  .copy-btn svg{width:16px;height:16px;display:block}
  .step{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:18px}
  .step h2{font-size:14px;margin:0 0 8px;color:var(--accent)}
  .small{font-size:11px;opacity:0.6;margin-top:4px}
  .ok{color:var(--green);font-weight:600}
  .row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}

  /* Mode focus / plein écran */
  .canvas-toolbar{display:flex;align-items:center;gap:6px;margin:8px 0 4px}
  .focus-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;letter-spacing:0.2px;cursor:pointer;transition:all 0.15s;font-family:inherit;opacity:0.75}
  .focus-btn:hover{opacity:1;border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,0.06)}
  .focus-btn svg{width:13px;height:13px;flex-shrink:0}

  /* Top toolbar visible only in focus mode */
  .focus-tools{display:none;position:fixed;top:0;left:0;right:0;z-index:60;background:rgba(14,17,22,0.92);border-bottom:1px solid var(--border);padding:6px 10px;align-items:center;gap:6px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);height:44px;box-sizing:border-box}
  .ftb{display:inline-flex;align-items:center;gap:5px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:11px;cursor:pointer;font-family:inherit;opacity:0.85;transition:all 0.15s}
  .ftb:hover{opacity:1;border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,0.08)}
  .ftb.active{background:var(--accent);color:var(--bg);border-color:var(--accent);opacity:1}
  .ftb.tool-btn{padding:6px 8px}
  .ftb.tool-btn svg{width:16px;height:16px}
  .ftb svg{width:14px;height:14px;flex-shrink:0}
  .ftb-spacer{flex:1}

  body.focus-mode{padding:0;max-width:none;overflow:hidden}
  body.focus-mode .focus-hide{display:none!important}
  body.focus-mode .canvas-toolbar{display:none}
  body.focus-mode .focus-tools{display:flex}
  body.focus-mode .step.canvas-step{background:transparent;border:none;padding:0;margin:0}

  /* Drawers en bottom sheet (slide-up depuis le bas) */
  body.focus-mode .pal-panel,
  body.focus-mode .row{display:none}
  body.focus-mode .pal-panel.drawer-open{display:block;position:fixed;bottom:54px;left:8px;right:8px;z-index:55;background:var(--panel);border:1px solid var(--border);border-radius:10px 10px 6px 6px;max-height:calc(100vh - 110px);overflow-y:auto;box-shadow:0 -4px 30px rgba(0,0,0,0.7);animation:slideUp .18s ease-out}
  body.focus-mode .row.drawer-open{display:flex;flex-direction:column;position:fixed;bottom:54px;left:8px;right:8px;z-index:55;background:var(--panel);border:1px solid var(--border);border-radius:10px 10px 6px 6px;padding:14px;box-shadow:0 -4px 30px rgba(0,0,0,0.7);animation:slideUp .18s ease-out}
  @keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* Canvas en mode focus : edge-to-edge, sens le plus long, dvh + safe-area pour Safari */
  body.focus-mode{padding:0;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
  /* En focus mode, les wrappers studio-side/pal-step/tools-step disparaissent comme box,
     leurs enfants flow comme s'ils étaient direct enfants du body. Permet aux drawers de fonctionner. */
  body.focus-mode .studio-side,
  body.focus-mode .pal-step,
  body.focus-mode .tools-step{display:contents}
  body.focus-mode .focus-tools{padding-top:max(6px, env(safe-area-inset-top))}
  body.focus-mode .canvas-wrap{position:fixed;top:calc(44px + env(safe-area-inset-top));bottom:env(safe-area-inset-bottom);left:env(safe-area-inset-left);right:env(safe-area-inset-right);margin:0;padding:0;width:auto;height:auto}
  body.focus-mode #canvas{position:absolute;top:50%;left:50%;aspect-ratio:32/8;transform:translate(-50%,-50%)}

  /* Portrait + focus : on rotate le body 90° pour forcer une présentation paysage */
  @media (orientation:portrait){
    body.focus-mode{width:100dvh;height:100dvw;position:fixed;top:0;left:0;transform-origin:0 0;transform:translateX(100dvw) rotate(90deg);overflow:hidden}
    body.focus-mode .focus-tools{position:absolute;top:0;left:0;right:0;height:44px;width:auto}
    body.focus-mode .canvas-wrap{position:absolute;top:44px;left:0;right:0;bottom:0}
    body.focus-mode #canvas{position:absolute;top:50%;left:50%;width:auto;height:auto;aspect-ratio:32/8;transform:translate(-50%,-50%)}
  }

  /* Séparateur visuel entre groupes de boutons toolbar */
  .ftb-sep{width:1px;height:22px;background:var(--border);margin:0 5px;align-self:center;flex-shrink:0}
</style>
</head>
<body>

<div class="focus-tools" id="focusTools">
  <button class="ftb" id="btnPalette" onclick="toggleDrawer('palette')" title="Couleurs">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/>
      <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/>
      <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/>
      <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/>
      <path d="M12 22a10 10 0 1 1 0-20 10 10 0 0 1 10 10c0 3-2 5-5 5h-2a1.7 1.7 0 0 0-1.7 1.7c0 .5.2.9.4 1.2.3.3.4.7.4 1.1 0 .9-.7 1.7-1.6 1.7-.2 0-.3 0-.5-.1z"/>
    </svg>
    <span class="ftb-label">Couleurs</span>
  </button>
  <button class="ftb" id="btnTools" onclick="toggleDrawer('tools')" title="Outils">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </svg>
    <span class="ftb-label">Outils</span>
  </button>
  <span class="ftb-sep"></span>
  <button class="ftb tool-btn active" data-tool="auto" onclick="setTool('auto')" title="Auto — clic = peint, re-clic même couleur = efface" aria-label="Auto">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="6" width="22" height="12" rx="6"/>
      <circle cx="16" cy="12" r="3" fill="currentColor"/>
    </svg>
  </button>
  <button class="ftb tool-btn" data-tool="pen" onclick="setTool('pen')" title="Stylo" aria-label="Stylo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
  </button>
  <button class="ftb tool-btn" data-tool="eraser" onclick="setTool('eraser')" title="Gomme" aria-label="Gomme">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 20H7L3 16c-1-1-1-2 0-3l9-9c1-1 2-1 3 0l6 6c1 1 1 2 0 3l-7 7"/>
      <path d="M5 11l9 9"/>
    </svg>
  </button>
  <span class="ftb-spacer"></span>
  <button class="ftb" id="focusExitBtn" onclick="toggleFocus()" title="Quitter">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3v3a2 2 0 0 1-2 2H3"/>
      <path d="M21 8h-3a2 2 0 0 1-2-2V3"/>
      <path d="M3 16h3a2 2 0 0 1 2 2v3"/>
      <path d="M16 21v-3a2 2 0 0 1 2-2h3"/>
    </svg>
    <span class="ftb-label">Quitter</span>
  </button>
</div>

<header class="studio-header focus-hide">
  <h1>Glyconnect Studio</h1>
  <p class="intro">Dessine une image sur la matrice. Le code se génère automatiquement en bas. Copie le et colle dans la partie "Decoration" de ta page Glyconnect</p>
</header>

<aside class="studio-side">
  <div class="step focus-hide">
    <h2>1. Nom du design</h2>
    <input type="text" id="presetName" placeholder="ex: licorne, étoile, mon-chat" maxlength="20" oninput="updateOutput()">
  </div>

  <div class="step pal-step">
    <h2 class="focus-hide">2. Couleur</h2>
    <div class="pal-panel" id="palette"></div>
  </div>

  <div class="step tools-step">
    <h2 class="focus-hide">3. Outils</h2>
    <div class="row">
      <div>
        <div class="small focus-hide" style="margin-bottom:4px;">Déplacer la grille</div>
        <div class="shift-grid">
          <button class="empty"></button>
          <button onclick="shiftGrid(0,-1)" title="Haut">↑</button>
          <button class="empty"></button>
          <button onclick="shiftGrid(-1,0)" title="Gauche">←</button>
          <button onclick="shiftGrid(0,0,true)" title="Centrer">⌂</button>
          <button onclick="shiftGrid(1,0)" title="Droite">→</button>
          <button class="empty"></button>
          <button onclick="shiftGrid(0,1)" title="Bas">↓</button>
          <button class="empty"></button>
        </div>
      </div>
      <div style="flex:1;min-width:140px;">
        <div class="small focus-hide" style="margin-bottom:4px;">Effacer / inverser</div>
        <button onclick="clearAll()">Effacer</button>
        <button onclick="invertCanvas()">⇅ Inverser</button>
      </div>
    </div>
  </div>
</aside>

<div class="step canvas-step">
  <div class="canvas-toolbar">
    <button class="ftb tool-btn" data-tool="pen" onclick="setTool('pen')" title="Stylo" aria-label="Stylo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </button>
    <button class="ftb tool-btn" data-tool="eraser" onclick="setTool('eraser')" title="Gomme" aria-label="Gomme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 20H7L3 16c-1-1-1-2 0-3l9-9c1-1 2-1 3 0l6 6c1 1 1 2 0 3l-7 7"/>
        <path d="M5 11l9 9"/>
      </svg>
    </button>
    <button class="ftb tool-btn active" data-tool="auto" onclick="setTool('auto')" title="Auto — clic = peint, re-clic même couleur = efface" aria-label="Auto">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="6" width="22" height="12" rx="6"/>
        <circle cx="16" cy="12" r="3" fill="currentColor"/>
      </svg>
    </button>
    <span class="ftb-sep"></span>
    <span style="flex:1"></span>
    <button class="focus-btn" id="focusBtn" onclick="toggleFocus()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
      <span>Plein écran</span>
    </button>
  </div>
  <div class="canvas-wrap">
    <div id="canvas"></div>
  </div>
  <div class="small focus-hide">Cliquer/glisser pour peindre.</div>
</div>

<div class="step focus-hide" id="stepCode">
  <h2>4. Code à copier-coller</h2>
  <div class="code-wrap">
    <textarea id="output" readonly placeholder="Dessine quelque chose, le code apparaîtra ici…"></textarea>
    <button class="copy-btn" id="copyBtn" onclick="copyOutput()" title="Copier" aria-label="Copier">
      <svg id="copyIconDefault" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
      <svg id="copyIconOk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </button>
  </div>
  <span id="copyStatus" class="small"></span>
</div>

<script>
const W = 32, H = 8;
let pixels = new Array(W*H).fill('#000000');
let currentColor = '#FF0000';
let currentTool = 'auto';  // 'pen' | 'eraser' | 'auto'
let dragMode = 1;  // utilisé seulement en mode 'auto'

function setTool(t) {
  currentTool = t;
  document.querySelectorAll('.tool-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tool === t));
}

// ── Palette organisée par teinte (HSL) ─────────────────────────────────────
const HUES = [
  {name:'Rouge',  h:  0},
  {name:'Orange', h: 25},
  {name:'Jaune',  h: 55},
  {name:'Lime',   h: 80},
  {name:'Vert',   h:120},
  {name:'Cyan',   h:175},
  {name:'Bleu',   h:210},
  {name:'Indigo', h:240},
  {name:'Violet', h:270},
  {name:'Magenta',h:300},
  {name:'Rose',   h:330},
];
const LIGHTNESS = [70, 55, 40, 25];  // clair → sombre

function hsl2hex(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h/30) % 12;
  const a = s * Math.min(l, 1-l);
  const f = n => l - a * Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n), 1)));
  const to = x => Math.round(255*x).toString(16).padStart(2,'0').toUpperCase();
  return '#' + to(f(0)) + to(f(8)) + to(f(4));
}

function buildPalette() {
  const p = document.getElementById('palette');
  p.innerHTML = '';

  // Ligne récents (mise à jour via renderRecent)
  const rrow = document.createElement('div');
  rrow.className = 'pal-row';
  rrow.innerHTML = '<div class="lbl">Récents</div><div class="swatches" id="paletteRecentSwatches"></div>';
  p.appendChild(rrow);

  // Ligne gris/blanc/noir
  const grays = ['#FFFFFF','#D0D0D0','#A0A0A0','#707070','#404040','#202020','#000000'];
  const grow = document.createElement('div');
  grow.className = 'pal-row';
  grow.innerHTML = '<div class="lbl">Gris</div>';
  const gsw = document.createElement('div');
  gsw.className = 'swatches';
  for (const c of grays) gsw.appendChild(makeSwatch(c));
  grow.appendChild(gsw);
  p.appendChild(grow);

  // Ligne par teinte
  for (const hue of HUES) {
    const row = document.createElement('div');
    row.className = 'pal-row';
    row.innerHTML = `<div class="lbl">${hue.name}</div>`;
    const sws = document.createElement('div');
    sws.className = 'swatches';
    for (const l of LIGHTNESS) {
      sws.appendChild(makeSwatch(hsl2hex(hue.h, 100, l)));
    }
    sws.appendChild(makeSwatch(hsl2hex(hue.h, 60, 55)));
    sws.appendChild(makeSwatch(hsl2hex(hue.h, 40, 65)));
    row.appendChild(sws);
    p.appendChild(row);
  }
}

function makeSwatch(c) {
  const sw = document.createElement('div');
  sw.className = 'sw';
  sw.style.background = c;
  sw.dataset.color = c;
  if (c.toUpperCase() === currentColor.toUpperCase()) sw.classList.add('active');
  sw.onclick = () => setColor(c);
  return sw;
}

// ── Couleurs récentes ──────────────────────────────────────────────────────
let recentColors = [];
try { recentColors = JSON.parse(localStorage.getItem('decor_recent_colors') || '[]'); } catch(e) {}

function setColor(c) {
  currentColor = c;
  if (currentTool === 'eraser') setTool('auto');  // sortir du mode gomme quand on choisit une couleur
  document.querySelectorAll('.sw').forEach(x =>
    x.classList.toggle('active', x.dataset.color && x.dataset.color.toUpperCase() === c.toUpperCase()));
  recentColors = [c, ...recentColors.filter(x => x.toUpperCase() !== c.toUpperCase())].slice(0, 12);
  try { localStorage.setItem('decor_recent_colors', JSON.stringify(recentColors)); } catch(e) {}
  renderRecent();
}

function renderRecent() {
  const el = document.getElementById('paletteRecentSwatches');
  if (!el) return;
  el.innerHTML = '';
  const colors = recentColors.length ? recentColors : [currentColor];
  for (const c of colors) {
    const sw = document.createElement('div');
    sw.className = 'sw';
    if (c.toUpperCase() === currentColor.toUpperCase()) sw.classList.add('active');
    sw.style.background = c;
    sw.dataset.color = c;
    sw.onclick = () => setColor(c);
    el.appendChild(sw);
  }
}

function buildCanvas() {
  const c = document.getElementById('canvas');
  c.innerHTML = '';
  for (let i = 0; i < W*H; i++) {
    const px = document.createElement('div');
    px.dataset.i = i;
    px.style.background = pixels[i];
    px.addEventListener('mousedown', e => { e.preventDefault(); paintStart(i); });
    px.addEventListener('mouseenter', e => { if (e.buttons & 1) paint(i); });
    px.addEventListener('touchstart', e => { e.preventDefault(); paintStart(i); });
    c.appendChild(px);
  }
  c.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    if (el && el.dataset && el.dataset.i !== undefined) paint(parseInt(el.dataset.i));
  });
}

function paintStart(i) {
  // En mode auto : décide une fois pour tout le drag (clic sur même couleur = efface)
  if (currentTool === 'auto') {
    dragMode = (pixels[i] !== '#000000' && pixels[i].toUpperCase() === currentColor.toUpperCase()) ? 0 : 1;
  }
  paint(i);
}

function paint(i) {
  let v;
  if (currentTool === 'pen') v = currentColor;
  else if (currentTool === 'eraser') v = '#000000';
  else v = (dragMode === 1) ? currentColor : '#000000';  // auto
  pixels[i] = v;
  document.getElementById('canvas').children[i].style.background = v;
  updateOutput();
}

function clearAll() {
  pixels = new Array(W*H).fill('#000000');
  refreshCanvas();
  updateOutput();
}

function invertCanvas() {
  pixels = pixels.map(c => c === '#000000' ? currentColor : '#000000');
  refreshCanvas();
  updateOutput();
}

function refreshCanvas() {
  const cells = document.getElementById('canvas').children;
  for (let i = 0; i < W*H; i++) cells[i].style.background = pixels[i];
}

// Décale les pixels (dx,dy) avec wrap par défaut, ou centre si center=true
function shiftGrid(dx, dy, center=false) {
  if (center) {
    // Trouve la bbox du contenu et centre
    let minX=W, maxX=-1, minY=H, maxY=-1;
    for (let y=0;y<H;y++) for (let x=0;x<W;x++) {
      if (pixels[y*W+x] !== '#000000') {
        if (x<minX) minX=x; if (x>maxX) maxX=x;
        if (y<minY) minY=y; if (y>maxY) maxY=y;
      }
    }
    if (maxX < 0) return;
    const cx = Math.floor((W-1-maxX-minX)/2);
    const cy = Math.floor((H-1-maxY-minY)/2);
    dx = cx; dy = cy;
  }
  const next = new Array(W*H).fill('#000000');
  for (let y=0; y<H; y++) {
    for (let x=0; x<W; x++) {
      const nx = x + dx, ny = y + dy;
      if (nx>=0 && nx<W && ny>=0 && ny<H) {
        next[ny*W + nx] = pixels[y*W + x];
      }
    }
  }
  pixels = next;
  refreshCanvas();
  updateOutput();
}

// Convertit hex #RRGGBB → RGB565 16 bits
function hex2rgb565(hex) {
  if (!hex || hex === '#000000') return 0;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return ((r&0xF8)<<8) | ((g&0xFC)<<3) | (b>>3);
}

function updateOutput() {
  const ta = document.getElementById('output');
  const hasContent = pixels.some(c => c !== '#000000');
  if (!hasContent) {
    ta.value = '';
    return;
  }
  const name = document.getElementById('presetName').value.trim() || 'sans-nom';
  const bytes = pixels.map(c => '0x' + hex2rgb565(c).toString(16).toUpperCase().padStart(4,'0')).join(', ');
  ta.value =
`// ═══════════════════════════════════════════════════════════
// 🎨 Design TC001 — "${name}"
// Date: ${new Date().toLocaleString('fr-FR')}
// ═══════════════════════════════════════════════════════════
NOM: ${name}
PIXELS:
${bytes}
// ═══════════════════════════════════════════════════════════`;
}

async function toggleFocus() {
  const on = document.body.classList.toggle('focus-mode');
  setTimeout(fitCanvas, 50);
  if (on) {
    try {
      const el = document.documentElement;
      const req = el.requestFullscreen || el.webkitRequestFullscreen || el.webkitRequestFullScreen;
      if (req) await req.call(el);
    } catch(e) {}
    try {
      if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
    } catch(e) { /* iOS / non-supporté : la rotation CSS prend le relais */ }
    window.scrollTo(0, 0);
  } else {
    closeAllDrawers();
    try { if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock(); } catch(e) {}
    try { if (document.fullscreenElement && document.exitFullscreen) await document.exitFullscreen(); } catch(e) {}
  }
}

function toggleDrawer(name) {
  const palette = document.getElementById('palette');
  const tools = document.querySelector('.tools-step .row');
  const isPalOpen   = palette.classList.contains('drawer-open');
  const isToolsOpen = tools.classList.contains('drawer-open');
  closeAllDrawers();
  if (name === 'palette' && !isPalOpen) {
    palette.classList.add('drawer-open');
    document.getElementById('btnPalette').classList.add('active');
  } else if (name === 'tools' && !isToolsOpen) {
    tools.classList.add('drawer-open');
    document.getElementById('btnTools').classList.add('active');
  }
}

function closeAllDrawers() {
  document.querySelectorAll('.drawer-open').forEach(x => x.classList.remove('drawer-open'));
  document.querySelectorAll('.ftb.active').forEach(x => x.classList.remove('active'));
}

function copyOutput() {
  const ta = document.getElementById('output');
  if (!ta.value) {
    document.getElementById('copyStatus').textContent = '⚠ Dessine d\'abord quelque chose';
    return;
  }
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBtn');
    const def = document.getElementById('copyIconDefault');
    const ok  = document.getElementById('copyIconOk');
    btn.classList.add('ok');
    def.style.display = 'none';
    ok.style.display = 'block';
    const s = document.getElementById('copyStatus');
    s.textContent = '✓ Copié, à coller sur WhatsApp';
    s.className = 'small ok';
    setTimeout(() => {
      btn.classList.remove('ok');
      def.style.display = 'block';
      ok.style.display = 'none';
      s.textContent = ''; s.className = 'small';
    }, 2000);
  });
}

function fitCanvas() {
  const canvas = document.getElementById('canvas');
  if (!canvas) return;
  const wrap = canvas.parentElement;
  const cw = wrap.clientWidth;
  const ch = wrap.clientHeight;
  const isFocus = document.body.classList.contains('focus-mode');
  const isStudio = window.innerWidth >= 900;
  // En mode mobile normal (pas studio, pas focus) : laisser CSS faire (width:100% + aspect-ratio)
  if (!isFocus && !isStudio) {
    canvas.style.width = '';
    canvas.style.height = '';
    return;
  }
  if (cw === 0 || ch === 0) {
    requestAnimationFrame(fitCanvas);
    return;
  }
  const aspect = 32 / 8;
  const w = Math.min(cw, ch * aspect);
  const h = w / aspect;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
}

window.addEventListener('resize', fitCanvas);
window.addEventListener('orientationchange', fitCanvas);

buildPalette();
buildCanvas();
renderRecent();
updateOutput();
fitCanvas();
</script>
