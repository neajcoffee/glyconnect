; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; Secrets (WiFi, transmitter ID, ntfy topics, etc.) sont définis dans secrets.ini
; (git-ignoré). Voir secrets.ini.example pour le template.

[platformio]
default_envs = ulanzi_debug
extra_configs = secrets.ini

[env]
platform = espressif32
board = esp32dev
upload_speed = 921600
framework = arduino
board_build.f_cpu = 240000000L
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_ldf_mode = chain
lib_deps =
	bblanchon/ArduinoJson@^7.3.0
	ESP32Async/AsyncTCP@^3.3.2
	ESP32Async/ESPAsyncWebServer@^3.6.2
	bblanchon/StreamUtils@^1.7.3
	fastled/FastLED@3.6.0
	marcmerlin/Framebuffer GFX@^1.1
	adafruit/Adafruit GFX Library@^1.11.11
	marcmerlin/FastLED NeoMatrix@^1.2
	lennarthennigs/Button2@^2.5.0
	lbussy/LCBUrl@^1.1.9
	adafruit/Adafruit SHT31 Library@^2.2.2
	h2zero/NimBLE-Arduino@^1.4.2

[env:ulanzi]
build_flags = -DULANZI
lib_deps =
	${env.lib_deps}
build_src_filter = +<*> -<DexcomBLE_BD.cpp> -<ble_test_main.cpp> -<ble_prod_main.cpp>

[env:ulanzi_debug]
build_flags =
	-DULANZI
	-DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
	-DDEBUG
	-DDEV_TRANSMITTER_ID='"${secrets.transmitter_id}"'
	-DFIRMWARE_VERSION=103
	-DDEV_WIFI_SSID='"${secrets.wifi_ssid}"'
	-DDEV_WIFI_PASS='"${secrets.wifi_pass}"'
	-DDEV_OTA_BASE_URL='"${secrets.ota_base_url}"'
	-DDEV_NTFY_TOPIC='"${secrets.ntfy_log_topic}"'
lib_deps =
	${env.lib_deps}
build_src_filter = +<*> -<DexcomBLE_BD.cpp> -<ble_test_main.cpp> -<ble_prod_main.cpp>

; ── Firmware test minimal Bluedroid (livrable via OTA depuis ulanzi_debug) ───
[env:ble_test]
build_flags =
	-DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
	-DDEV_TRANSMITTER_ID='"${secrets.transmitter_id}"'
	-DFIRMWARE_VERSION=102
	-DDEV_WIFI_SSID='"${secrets.wifi_ssid}"'
	-DDEV_WIFI_PASS='"${secrets.wifi_pass}"'
	-DDEV_OTA_BASE_URL='"${secrets.ota_base_url}"'
	-DDEV_NTFY_TOPIC='"${secrets.ntfy_log_topic}"'
lib_deps =
	; Bluedroid BLE inclus dans le framework Arduino ESP32 — aucune lib externe
build_src_filter = -<*> +<DexcomBLE_BD.cpp> +<ble_test_main.cpp>

; ── Firmware production WiFi + Nightscout + display + OTA ───────────────────
[env:wifi_prod]
build_flags =
	-DULANZI
	-DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_ERROR
	-DFIRMWARE_VERSION=300
	-DDEV_FORCE_WIFI
	-DDEV_WIFI_SSID='"${secrets.wifi_ssid}"'
	-DDEV_WIFI_PASS='"${secrets.wifi_pass}"'
	-DDEV_NIGHTSCOUT_URL='"${secrets.nightscout_url}"'
	-DDEV_NIGHTSCOUT_API_KEY='"${secrets.nightscout_api_key}"'
	-DDEV_OTA_BASE_URL='"${secrets.ota_base_url}"'
	-DDEV_NTFY_TOPIC='"${secrets.ntfy_log_topic}"'
lib_deps =
	${env.lib_deps}
build_src_filter = +<*> -<DexcomBLE_BD.cpp> -<ble_test_main.cpp> -<ble_prod_main.cpp>

; ── Firmware DEV : ntfy.sh OTA en HTTP plain (dev à distance, runtime) ───────
[env:ble_dev]
build_flags =
	-DULANZI
	-DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_WARN
	-DDEBUG
	-DDEV_TRANSMITTER_ID='"${secrets.transmitter_id}"'
	-DFIRMWARE_VERSION=469
	-DDEV_WIFI_SSID='"${secrets.wifi_ssid}"'
	-DDEV_WIFI_PASS='"${secrets.wifi_pass}"'
	-DDEV_OTA_ENABLE
	-DDEV_NTFY_OTA_TOPIC='"${secrets.ntfy_ota_topic}"'
	-DDEV_NTFY_DATA_TOPIC='"${secrets.ntfy_data_topic}"'
	-DDEV_OTA_BASE_URL='"${secrets.ota_base_url}"'
	-DDEV_NTFY_TOPIC='"${secrets.ntfy_log_topic}"'
lib_deps =
	bblanchon/ArduinoJson@^7.3.0
	bblanchon/StreamUtils@^1.7.3
	fastled/FastLED@3.6.0
	marcmerlin/Framebuffer GFX@^1.1
	adafruit/Adafruit GFX Library@^1.11.11
	marcmerlin/FastLED NeoMatrix@^1.2
build_src_filter = -<*> +<DexcomBLE_BD.cpp> +<ble_prod_main.cpp> +<DisplayManager.cpp> +<globals.cpp> +<UserConfig.cpp>

; ── Firmware DEV NimBLE : alternative à Bluedroid pour réduire la fragmentation ──
[env:ble_nimble]
build_flags =
	-DULANZI
	-DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_WARN
	-DDEBUG
	-DUSE_NIMBLE
	-DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL_DISABLED
	-DCONFIG_BT_NIMBLE_ROLE_BROADCASTER_DISABLED
	-DDEV_TRANSMITTER_ID='"${secrets.transmitter_id}"'
	-DFIRMWARE_VERSION=470
	-DDEV_WIFI_SSID='"${secrets.wifi_ssid}"'
	-DDEV_WIFI_PASS='"${secrets.wifi_pass}"'
	-DDEV_OTA_ENABLE
	-DDEV_NTFY_OTA_TOPIC='"${secrets.ntfy_ota_topic}"'
	-DDEV_NTFY_DATA_TOPIC='"${secrets.ntfy_data_topic}"'
	-DDEV_OTA_BASE_URL='"${secrets.ota_base_url}"'
	-DDEV_NTFY_TOPIC='"${secrets.ntfy_log_topic}"'
lib_deps =
	bblanchon/ArduinoJson@^7.3.0
	bblanchon/StreamUtils@^1.7.3
	fastled/FastLED@3.6.0
	marcmerlin/Framebuffer GFX@^1.1
	adafruit/Adafruit GFX Library@^1.11.11
	marcmerlin/FastLED NeoMatrix@^1.2
	h2zero/NimBLE-Arduino@^1.4.2
build_src_filter = -<*> +<DexcomBLE_NB.cpp> +<ble_prod_main.cpp> +<DisplayManager.cpp> +<globals.cpp> +<UserConfig.cpp>

; ── Firmware production : Bluedroid + display FastLED + OTA ──────────────────
[env:ble_prod]
build_flags =
	-DULANZI
	-DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_ERROR
	-DDEV_TRANSMITTER_ID='"${secrets.transmitter_id}"'
	-DFIRMWARE_VERSION=219
	-DDEV_WIFI_SSID='"${secrets.wifi_ssid}"'
	-DDEV_WIFI_PASS='"${secrets.wifi_pass}"'
	-DDEV_OTA_BASE_URL='"${secrets.ota_base_url}"'
	-DDEV_NTFY_TOPIC='"${secrets.ntfy_log_topic}"'
lib_deps =
	bblanchon/ArduinoJson@^7.3.0
	bblanchon/StreamUtils@^1.7.3
	fastled/FastLED@3.6.0
	marcmerlin/Framebuffer GFX@^1.1
	adafruit/Adafruit GFX Library@^1.11.11
	marcmerlin/FastLED NeoMatrix@^1.2
build_src_filter = -<*> +<DexcomBLE_BD.cpp> +<ble_prod_main.cpp> +<DisplayManager.cpp> +<globals.cpp> +<UserConfig.cpp>
